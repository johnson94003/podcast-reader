name: Daily Podcast Update

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00（台灣時間 10:00）
  workflow_dispatch:        # 允許手動觸發

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yt-dlp python-dotenv requests

      - name: Write YouTube cookies (if secret exists)
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube_cookies.txt
            echo "YOUTUBE_COOKIES_FILE=youtube_cookies.txt" >> $GITHUB_ENV
            echo "Cookie file written."
          else
            echo "No YOUTUBE_COOKIES secret — will try without cookies."
          fi

      - name: Scan and process new videos
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd podcast_reader
          python3 monitor.py

      - name: Rebuild all HTML from cache
        run: |
          cd podcast_reader
          python3 -c "from monitor import rebuild_all_html; rebuild_all_html()"

      - name: Deploy to Netlify
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if ls podcast_reader/output/*.html 2>/dev/null | head -1 | grep -q .; then
            cd podcast_reader
            python3 deploy.py
          else
            echo "No HTML files in output/ — skipping deploy."
          fi

      - name: Commit updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add podcast_reader/processed_videos.json podcast_reader/cache/ 2>/dev/null || true
          git diff --staged --quiet || (
            git commit -m "auto: process new podcast videos [skip ci]"
            git push
          )
