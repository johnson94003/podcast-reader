name: Daily Podcast Update

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00（台灣時間 10:00）
  workflow_dispatch:        # 允許手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yt-dlp python-dotenv requests

      - name: Write YouTube cookies (if secret exists)
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube_cookies.txt
            echo "YOUTUBE_COOKIES_FILE=youtube_cookies.txt" >> $GITHUB_ENV
            echo "Cookie file written."
          else
            echo "No YOUTUBE_COOKIES secret — will try iOS client."
          fi

      - name: Scan and process new videos
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 monitor.py

      - name: Rebuild all HTML from cache
        run: python3 -c "from monitor import rebuild_all_html; rebuild_all_html()"

      - name: Deploy to GitHub Pages
        run: |
          if ls output/*.html 2>/dev/null | head -1 | grep -q .; then
            cd output
            git init
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "deploy: update podcast pages [skip ci]"
            git push --force \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
              HEAD:gh-pages
          else
            echo "No HTML files in output/ — skipping deploy."
          fi

      - name: Commit updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_videos.json cache/ 2>/dev/null || true
          git diff --staged --quiet || (
            git commit -m "auto: process new podcast videos [skip ci]"
            git pull --rebase origin main
            git push
          )

      - name: Build email subject and body
        run: |
          python3 - <<'PYEOF'
          import json
          from pathlib import Path

          summary_path = Path("cache/last_run.json")
          if not summary_path.exists():
              subject = "Podcast Reader — 今日執行異常"
              body = (
                  "last_run.json 不存在，monitor.py 可能提早失敗。\n"
                  "請到 GitHub Actions 查看 log。"
              )
          else:
              s = json.loads(summary_path.read_text())
              run_date = s.get("date", "")

              if s["status"] == "no_new":
                  subject = f"Podcast Reader {run_date} — 今天沒有新影片"
                  body = (
                      f"✅ 掃描完成，頻道今天沒有新影片。\n\n"
                      f"網站：https://johnson94003.github.io/podcast-reader"
                  )
              elif s["status"] == "processed":
                  videos = s["processed"]
                  lines = "\n".join(
                      f"▶ {v['title']}\n   {v['url']}" for v in videos
                  )
                  remaining = s.get("remaining", 0)
                  rem_note = (
                      f"\n\n還有 {remaining} 支影片等待明天繼續處理。"
                      if remaining > 0 else ""
                  )
                  subject = f"Podcast Reader {run_date} — 新增 {len(videos)} 支影片 ✅"
                  body = (
                      f"今天成功翻譯並部署以下影片：\n\n"
                      f"{lines}{rem_note}\n\n"
                      f"網站：https://johnson94003.github.io/podcast-reader"
                  )
              else:
                  failed = s.get("failed", [])
                  lines = "\n".join(f"✗ {v['title']}" for v in failed)
                  subject = f"Podcast Reader {run_date} — 處理失敗 ❌"
                  body = (
                      f"以下影片處理失敗：\n\n{lines}\n\n"
                      f"請到 GitHub Actions 查看詳細 log。"
                  )

          Path("/tmp/email_subject.txt").write_text(subject, encoding="utf-8")
          Path("/tmp/email_body.txt").write_text(body, encoding="utf-8")
          print("Subject:", subject)
          PYEOF
          echo "EMAIL_SUBJECT=$(cat /tmp/email_subject.txt)" >> $GITHUB_ENV

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ env.EMAIL_SUBJECT }}
          to: a0973271958@gmail.com
          from: Podcast Reader <${{ secrets.GMAIL_USER }}>
          body: file:///tmp/email_body.txt
